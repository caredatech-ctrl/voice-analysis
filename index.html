<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Analyzer | PRO</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --border: #334155;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
        }
        h2 { text-align: center; margin-top: 0; font-size: 1.8rem; letter-spacing: -0.5px; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; color: #cbd5e1; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background-color: var(--accent);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button:hover { background-color: var(--accent-hover); }
        button:disabled { background-color: #475569; cursor: not-allowed; }
        
        #status-box { 
            text-align: center; 
            margin-top: 1.5rem; 
            font-size: 0.95rem; 
            color: #60a5fa; 
            min-height: 1.5rem;
            font-weight: 500;
        }
        
        .loader {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #results {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 8px;
            background-color: #0f172a;
            display: none;
            text-align: center;
            border: 1px solid var(--border);
        }
        .match-status { font-size: 1.8rem; font-weight: 900; margin-bottom: 0.5rem; }
        .match-yes { color: var(--success); }
        .match-no { color: var(--error); }
        .confidence { font-size: 2.5rem; font-weight: 700; margin: 0.5rem 0; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Voice Analyzer</h2>
    
    <div class="form-group">
        <label>Hugging Face Access Token</label>
        <input type="text" id="hf-token" placeholder="hf_..." autocomplete="off">
    </div>

    <div class="form-group">
        <label>First Audio File (.mp3, .opus, .wav)</label>
        <input type="file" id="audio1" accept="audio/*">
    </div>

    <div class="form-group">
        <label>Second Audio File (.mp3, .opus, .wav)</label>
        <input type="file" id="audio2" accept="audio/*">
    </div>

    <button id="analyze-btn" onclick="startAnalysis()">
        <div class="loader" id="btn-loader"></div>
        <span id="btn-text">Analyze Similarity</span>
    </button>
    
    <div id="status-box"></div>

    <div id="results">
        <div id="match-status" class="match-status"></div>
        <div class="confidence" id="confidence-score">0.00%</div>
    </div>
</div>

<script>
    const HF_API_URL = "https://api-inference.huggingface.co/pipeline/feature-extraction/Xenova/ast-finetuned-audioset-10-10-0.4593";

    async function sendToAI(file, token) {
        const arrayBuffer = await file.arrayBuffer();
        let retries = 4; // Will automatically retry for up to 40 seconds
        
        while (retries > 0) {
            try {
                const response = await fetch(HF_API_URL, {
                    headers: { 
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/octet-stream"
                    },
                    method: "POST",
                    body: arrayBuffer
                });
                
                // If model is asleep, server returns 503
                if (response.status === 503) {
                    document.getElementById('status-box').innerText = "Model is booting up... Auto-retrying in 10s...";
                    await new Promise(r => setTimeout(r, 10000));
                    retries--;
                    continue;
                }
                
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`API Error: ${response.status} - ${errText}`);
                }
                
                return await response.json();
                
            } catch (err) {
                // SILENTLY CATCH NETWORK/CORS ERRORS.
                // The browser panics during a cold start. We ignore the panic and force it to wait.
                console.warn("Caught network exception. AI is likely sleeping.", err);
                document.getElementById('status-box').innerText = "Waking up Hugging Face AI... This takes ~20 seconds on the very first run.";
                await new Promise(r => setTimeout(r, 10000));
                retries--;
            }
        }
        throw new Error("Connection failed. Hugging Face servers are completely unresponsive right now.");
    }

    function calculateCosineSimilarity(vectorA, vectorB) {
        const arrA = vectorA.flat(Infinity);
        const arrB = vectorB.flat(Infinity);
        
        let dotProduct = 0.0, magA = 0.0, magB = 0.0;
        const len = Math.min(arrA.length, arrB.length);

        for (let i = 0; i < len; i++) {
            dotProduct += arrA[i] * arrB[i];
            magA += arrA[i] * arrA[i];
            magB += arrB[i] * arrB[i];
        }
        if (magA === 0 || magB === 0) return 0;
        return dotProduct / (Math.sqrt(magA) * Math.sqrt(magB));
    }

    async function startAnalysis() {
        const token = document.getElementById('hf-token').value.trim();
        const file1 = document.getElementById('audio1').files[0];
        const file2 = document.getElementById('audio2').files[0];
        
        const btn = document.getElementById('analyze-btn');
        const btnText = document.getElementById('btn-text');
        const loader = document.getElementById('btn-loader');
        const statusBox = document.getElementById('status-box');
        const resultsArea = document.getElementById('results');

        if (!token) return alert("Please enter your Hugging Face Token.");
        if (!file1 || !file2) return alert("Please upload both audio files.");

        try {
            // UI Loading State
            btn.disabled = true;
            btnText.innerText = "Processing...";
            loader.style.display = "block";
            resultsArea.style.display = "none";
            statusBox.innerText = "Connecting to Hugging Face API...";
            
            // Process files
            const vector1 = await sendToAI(file1, token);
            statusBox.innerText = "Audio 1 processed. Analyzing Audio 2...";
            
            const vector2 = await sendToAI(file2, token);
            statusBox.innerText = "Calculating precision match...";

            // Math execution
            const similarityScore = calculateCosineSimilarity(vector1, vector2);
            const matchPercentage = Math.max(0, Math.min(100, ((similarityScore + 1) / 2) * 100));
            
            // Display Results
            statusBox.innerText = "Analysis Complete.";
            resultsArea.style.display = "block";
            
            const matchStatus = document.getElementById('match-status');
            document.getElementById('confidence-score').innerText = `${matchPercentage.toFixed(2)}%`;

            if (matchPercentage >= 82) {
                matchStatus.innerText = "✓ VOICE MATCH";
                matchStatus.className = "match-status match-yes";
            } else {
                matchStatus.innerText = "✗ NO MATCH";
                matchStatus.className = "match-status match-no";
            }

        } catch (err) {
            console.error(err);
            statusBox.innerText = "";
            alert(`Error: ${err.message}`);
        } finally {
            // Reset UI State
            btn.disabled = false;
            btnText.innerText = "Analyze Similarity";
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
